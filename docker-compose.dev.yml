services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: baitulmal
      MYSQL_USER: baitul
      MYSQL_PASSWORD: baitulpass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3309:3306"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app:delegated
      - /app/node_modules
    ports:
      - "5000:3000"
    command: sh -c "npm run dev"
    environment:
      - NODE_ENV=development

  frontend:
    image: node:20-bullseye-slim
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    ports:
      - "5173:5173"
    # install deps if vite binary is missing, then start vite in host mode
    command: sh -c "(test -x node_modules/.bin/vite || npm install --legacy-peer-deps --no-audit --no-fund) && npm run dev -- --host"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  db_data:
